<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Failover Incident Storyboard</title>
    <!-- We will use Tailwind CSS for styling, loaded from a CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for a clean, diagram-like feel */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Simple animation for the traffic dots */
        @keyframes flow-a {
            from { transform: translateX(-150px); opacity: 0; }
            to { transform: translateX(150px); opacity: 1; }
        }
        @keyframes flow-b {
            from { transform: translateX(-150px); opacity: 0; }
            to { transform: translateX(150px); opacity: 1; }
        }
        .traffic-dot {
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            animation-duration: 3s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        /* State-specific styles */
        #bridge-a.status-ok { border-color: #22c55e; } /* green-500 */
        #bridge-a.status-broken { border-color: #ef4444; border-style: dashed; } /* red-500 */
        #bridge-b.status-ok { border-color: #22c55e; }
        #bridge-b.status-standby { border-color: #6b7280; } /* gray-500 */
        
        #light-a.status-ok { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        #light-a.status-broken { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        #light-b.status-ok { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        #light-b.status-standby { background-color: #ef4444; }
        
        #lever.status-b { transform: rotate(-35deg); background-color: #22c55e; }
        #lever.status-a { transform: rotate(35deg); background-color: #6b7280; }

        #sts-office.status-ok { border-color: #3b82f6; } /* blue-500 */
        #sts-office.status-broken { border-color: #ef4444; } /* red-500 */

        /* Transition for smoother state changes */
        .transition-all { transition: all 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col h-screen overflow-hidden">

    <!-- 1. Top Navigation -->
    <nav class="flex justify-between items-center p-4 w-full max-w-6xl mx-auto">
        <button id="prev-btn" class="bg-blue-600 hover:bg-blue-700 rounded-full p-3 transition-all transform active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <span id="step-title" class="text-xl font-bold text-gray-300"></span>
        <button id="next-btn" class="bg-blue-600 hover:bg-blue-700 rounded-full p-3 transition-all transform active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </nav>

    <!-- 2. Main Visualization Canvas -->
    <main class="flex-grow flex items-center justify-center w-full max-w-7xl mx-auto p-4 md:p-8 relative">
        <div class="w-full h-full relative">
            
            <!-- Global Security Office (STS) -->
            <div id="sts-office" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-blue-900 p-4 rounded-lg shadow-xl border-2 z-20 flex items-center space-x-3 status-ok transition-all">
                <div id="sts-icon" class="transition-all">
                    <span class="text-2xl" title="Global Security Office (AWS STS)">🛡️</span>
                </div>
                <div id="sts-fail-icon" class="text-red-500 hidden transition-all">
                    <span class="text-3xl font-bold" title="STS Service Failed">💥</span>
                </div>
                <span class="text-lg font-bold text-gray-300">Security Office (STS)</span>
            </div>

            <!-- Signal Box (Control Tower) -->
            <div id="signal-box" class="absolute top-1/2 left-8 md:left-24 transform -translate-y-1/2 bg-gray-700 p-6 rounded-lg shadow-xl border-2 border-gray-600 z-20">
                <div class="flex flex-col items-center space-y-4">
                    <span class="text-2xl" title="Signalman (Failover Script)">👤</span>
                    <span id="agent-status" class="text-xs font-mono uppercase bg-gray-900 px-2 py-1 rounded"></span>
                    
                    <!-- Failover Lever -->
                    <div class="pt-8">
                        <div id="lever" class="w-4 h-16 bg-gray-500 rounded-full transform rotate-45 transition-all duration-500" style="transform-origin: bottom center;"></div>
                        <div class="w-10 h-10 bg-gray-800 rounded-full border-4 border-gray-600 -mt-5"></div>
                    </div>
                </div>
                <!-- Security Phone -->
                <div id="security-phone" class="absolute top-4 right-0 transform translate-x-3/4 p-2 bg-gray-800 rounded-lg hidden z-30">
                    <span class="text-2xl" title="Security Phone (AWS API Client)">📞</span>
                </div>
                <!-- Connection Lines (Vertical) -->
                <div id="phone-line" class="absolute left-1/2 top-0 w-0.5 h-32 bg-yellow-400 border border-yellow-500 hidden z-10 transform -translate-y-full" style="animation: pulse 2s infinite;"></div>
                <div id="phone-line-fail" class="absolute left-1/2 top-0 w-0.5 h-16 bg-red-500 border border-red-600 hidden z-10 transform -translate-y-full"></div>
                <span id="fail-x" class="absolute left-1/2 top-0 text-5xl text-red-500 font-bold hidden z-10 transform -translate-y-full -translate-x-1/2" style="padding-top: 1rem; margin-top: -5rem;">✗</span>
            </div>


            <!-- Infrastructure (Bridges) -->
            <div class="absolute w-1/2 right-0 top-1/4 h-3/4 flex flex-col justify-around">

                <!-- Bridge A (Primary) -->
                <div class="relative w-full">
                    <div class="absolute -left-32 top-1/2 transform -translate-y-1/2 flex items-center space-x-2">
                        <span class="text-lg font-bold">A</span>
                        <div id="light-a" class="w-4 h-4 rounded-full transition-all"></div>
                    </div>
                    <div id="bridge-a" class="w-full h-16 bg-gray-800 rounded-lg border-4 transition-all flex items-center justify-center relative overflow-hidden">
                        <span class="text-lg font-bold text-gray-400">Bridge A (Virginia)</span>
                        
                        <!-- Traffic on Bridge A -->
                        <div id="traffic-a" class="absolute w-full h-full">
                            <div class="traffic-dot" style="top: 30%; animation-name: flow-a; animation-delay: 0s;"></div>
                            <div class="traffic-dot" style="top: 60%; animation-name: flow-a; animation-delay: 1.5s;"></div>
                        </div>
                    </div>
                </div>

                <!-- Bridge B (Failover) -->
                <div class="relative w-full">
                    <div class="absolute -left-32 top-1/2 transform -translate-y-1/2 flex items-center space-x-2">
                        <span class="text-lg font-bold">B</span>
                        <div id="light-b" class="w-4 h-4 rounded-full transition-all"></div>
                    </div>
                    <div id="bridge-b" class="w-full h-16 bg-gray-800 rounded-lg border-4 transition-all flex items-center justify-center relative overflow-hidden">
                        <span class="text-lg font-bold text-gray-400">Bridge B (Backup)</span>
                        
                        <!-- Traffic on Bridge B -->
                        <div id="traffic-b" class="absolute w-full h-full hidden">
                            <div class="traffic-dot" style="top: 30%; animation-name: flow-b; animation-delay: 0s;"></div>
                            <div class="traffic-dot" style="top: 60%; animation-name: flow-b; animation-delay: 1.5s;"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- 3. Bottom Story Text Cartridge -->
    <footer class="w-full bg-gray-800 p-4 md:p-6 shadow-inner z-30">
        <p id="story-text" class="text-center text-lg md:text-xl text-gray-200 w-full max-w-6xl mx-auto"></p>
    </footer>

    <script>
        // Storyboard Data
        const steps = [
            {
                title: "Step 0: Normal Operations",
                text: "All traffic flows to Bridge A (Virginia). The global Security Office (STS) is online. The Signalman (our script) is monitoring.",
                setup: () => {
                    // Bridges
                    document.getElementById('bridge-a').className = 'w-full h-16 bg-gray-800 rounded-lg border-4 transition-all flex items-center justify-center relative overflow-hidden status-ok';
                    document.getElementById('bridge-b').className = 'w-full h-16 bg-gray-800 rounded-lg border-4 transition-all flex items-center justify-center relative overflow-hidden status-standby';
                    // Lights
                    document.getElementById('light-a').className = 'w-4 h-4 rounded-full transition-all status-ok';
                    document.getElementById('light-b').className = 'w-4 h-4 rounded-full transition-all status-standby';
                    // Traffic
                    document.getElementById('traffic-a').classList.remove('hidden');
                    document.getElementById('traffic-b').classList.add('hidden');
                    // Agent
                    document.getElementById('agent-status').innerText = "Monitoring";
                    document.getElementById('lever').className = 'w-4 h-16 rounded-full transition-all duration-500 status-a';
                    // STS Office
                    document.getElementById('sts-office').className = "absolute top-4 left-1/2 transform -translate-x-1/2 bg-blue-900 p-4 rounded-lg shadow-xl border-2 z-20 flex items-center space-x-3 status-ok transition-all";
                    document.getElementById('sts-icon').classList.remove('hidden');
                    document.getElementById('sts-fail-icon').classList.add('hidden');
                    // Phone
                    document.getElementById('security-phone').classList.add('hidden');
                    document.getElementById('phone-line').classList.add('hidden');
                    document.getElementById('phone-line-fail').classList.add('hidden');
                    document.getElementById('fail-x').classList.add('hidden');
                }
            },
            {
                title: "Step 1: The First Failure",
                text: "A cloud provider outage strikes! Bridge A (Virginia) collapses and all traffic stops. This is the first, visible failure.",
                setup: () => {
                    steps[0].setup(); // Start from step 0 state
                    // Bridges
                    document.getElementById('bridge-a').classList.remove('status-ok');
                    document.getElementById('bridge-a').classList.add('status-broken');
                    // Lights
                    document.getElementById('light-a').classList.remove('status-ok');
                    document.getElementById('light-a').classList.add('status-broken');
                    // Traffic
                    document.getElementById('traffic-a').classList.add('hidden'); // Traffic stops
                }
            },
            {
                title: "Step 2: Failover Initiated",
                text: "The Signalman (our script) detects the bridge failure. He prepares to pull the lever to redirect all traffic to the healthy Bridge B.",
                setup: () => {
                    steps[1].setup(); // Start from step 1 state
                    // Agent
                    document.getElementById('agent-status').innerText = "Alerted!";
                    document.getElementById('agent-status').classList.add('text-red-400');
                }
            },
            {
                title: "Step 3: The Security Check",
                text: "Safety rule: 'To activate the lever, first get an authorization code from the global Security Office.' The agent makes the call...",
                setup: () => {
                    steps[2].setup(); // Start from step 2 state
                    // Agent
                    document.getElementById('agent-status').innerText = "Checking...";
                    document.getElementById('agent-status').classList.remove('text-red-400');
                    document.getElementById('agent-status').classList.add('text-yellow-400');
                    // Phone Call
                    document.getElementById('security-phone').classList.remove('hidden');
                    document.getElementById('phone-line').classList.remove('hidden');
                }
            },
            {
                title: "Step 4: The Second Failure (Catch-22)",
                text: "The call fails! The agent discovers the Security Office (STS) is *also* down. This is the second, hidden failure. The failover is blocked.",
                setup: () => {
                    steps[3].setup(); // Start from step 3 state
                    // Agent
                    document.getElementById('agent-status').innerText = "Blocked!";
                    document.getElementById('agent-status').classList.remove('text-yellow-400');
                    document.getElementById('agent-status').classList.add('text-red-400');
                    // Phone Call
                    document.getElementById('phone-line').classList.add('hidden');
                    document.getElementById('phone-line-fail').classList.remove('hidden');
                    document.getElementById('fail-x').classList.remove('hidden');
                    // STS Office
                    document.getElementById('sts-office').classList.remove('status-ok');
                    document.getElementById('sts-office').classList.add('status-broken');
                    document.getElementById('sts-icon').classList.add('hidden');
                    document.getElementById('sts-fail-icon').classList.remove('hidden');
                }
            },
            {
                title: "Step 5: Resolution",
                text: "After AWS restored the Security Office (STS), the authorization call succeeded. The lever was pulled, and traffic successfully moved to Bridge B.",
                setup: () => {
                    steps[4].setup(); // Start from step 4 state
                    // Bridges
                    document.getElementById('bridge-b').classList.remove('status-standby');
                    document.getElementById('bridge-b').classList.add('status-ok');
                    // Lights
                    document.getElementById('light-b').classList.remove('status-standby');
                    document.getElementById('light-b').classList.add('status-ok');
                    // Traffic
                    document.getElementById('traffic-b').classList.remove('hidden');
                    // Agent
                    document.getElementById('agent-status').innerText = "Recovered";
                    document.getElementById('agent-status').classList.remove('text-red-400');
                    document.getElementById('agent-status').classList.add('text-green-400');
                    document.getElementById('lever').className = 'w-4 h-16 rounded-full transition-all duration-500 status-b';
                    // STS Office
                    document.getElementById('sts-office').classList.remove('status-broken');
                    document.getElementById('sts-office').classList.add('status-ok');
                    document.getElementById('sts-icon').classList.remove('hidden');
                    document.getElementById('sts-fail-icon').classList.add('hidden');
                    // Phone
                    document.getElementById('security-phone').classList.add('hidden');
                    document.getElementById('phone-line-fail').classList.add('hidden');
                    document.getElementById('fail-x').classList.add('hidden');
                }
            }
        ];

        let currentStep = 0;

        // Get DOM elements
        const prevButton = document.getElementById('prev-btn');
        const nextButton = document.getElementById('next-btn');
        const storyText = document.getElementById('story-text');
        const stepTitle = document.getElementById('step-title');

        // Update scene function
        function updateScene(stepIndex) {
            const step = steps[stepIndex];
            
            // Update text
            storyText.innerText = step.text;
            stepTitle.innerText = step.title;

            // Run setup for visual elements
            step.setup();
            
            // Disable/Enable buttons
            prevButton.disabled = stepIndex === 0;
            nextButton.disabled = stepIndex === steps.length - 1;
            prevButton.style.opacity = stepIndex === 0 ? 0.5 : 1;
            nextButton.style.opacity = stepIndex === steps.length - 1 ? 0.5 : 1;
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            updateScene(currentStep);
        });

        nextButton.addEventListener('click', () => {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateScene(currentStep);
            }
        });

        prevButton.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateScene(currentStep);
            }
        });

    </script>
</body>
</html>
